<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - iABS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-black">
    <div id="root"></div>
    
    <script type="text/babel">
        // Static social media data - no database dependency
        let platforms = [
            {
                platform_key: 'kick',
                platform_name: 'KICK',
                follower_count: 121100,
                color_hex: '#53FC18',
                profile_url: 'https://kick.com/iabs',
                last_updated: new Date().toISOString()
            },
            {
                platform_key: 'snapchat',
                platform_name: 'Snapchat',
                follower_count: 1200000,
                color_hex: '#FFFC00',
                profile_url: 'https://www.snapchat.com/@iabsq',
                last_updated: new Date().toISOString()
            },
            {
                platform_key: 'instagram',
                platform_name: 'Instagram',
                follower_count: 21300,
                color_hex: '#E1306C',
                profile_url: 'https://www.instagram.com/absq/',
                last_updated: new Date().toISOString()
            },
            {
                platform_key: 'tiktok',
                platform_name: 'TikTok',
                follower_count: 42300,
                color_hex: '#FE2C55',
                profile_url: 'https://www.tiktok.com/@iabsq',
                last_updated: new Date().toISOString()
            },
            {
                platform_key: 'x',
                platform_name: 'X',
                follower_count: 57200,
                color_hex: '#000000',
                profile_url: 'https://x.com/iABSq',
                last_updated: new Date().toISOString()
            },
            {
                platform_key: 'whatsapp',
                platform_name: 'WhatsApp',
                follower_count: 9100,
                color_hex: '#25D366',
                profile_url: 'https://www.whatsapp.com/channel/0029VadbqYx5Ui2eInkr7v2E',
                last_updated: new Date().toISOString()
            },
            {
                platform_key: 'discord',
                platform_name: 'Discord',
                follower_count: 9000,
                color_hex: '#5865F2',
                profile_url: 'https://discord.com/invite/64aggJ9yRA',
                last_updated: new Date().toISOString()
            },
            {
                platform_key: 'youtube',
                platform_name: 'YouTube',
                follower_count: 37000,
                color_hex: '#FF0000',
                profile_url: 'https://www.youtube.com/channel/UCdIM7MB-8G-FgE7ld3XAQ8w',
                last_updated: new Date().toISOString()
            }
        ];
        
        let history = [];
        let currentSection = 'social-media';
        
        // Get icon HTML
        function getIcon(platformKey) {
            const icons = {
                instagram: '<i class="fab fa-instagram text-pink-500"></i>',
                tiktok: '<i class="fab fa-tiktok text-black"></i>',
                x: '<i class="fab fa-x-twitter text-black"></i>',
                whatsapp: '<i class="fab fa-whatsapp text-green-500"></i>',
                snapchat: '<i class="fab fa-snapchat text-yellow-400"></i>',
                discord: '<i class="fab fa-discord text-blue-500"></i>',
                youtube: '<i class="fab fa-youtube text-red-500"></i>',
                kick: '<i class="fas fa-kick text-green-400"></i>'
            };
            return icons[platformKey] || '<i class="fas fa-question text-gray-500"></i>';
        }
        
        // Format number
        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toString();
        }
        
        // Show section
        function showSection(section) {
            currentSection = section;
            render();
        }
        
        // Render function
        function render() {
            const root = document.getElementById('root');
            
            let content = '';
            
            if (currentSection === 'social-media') {
                content = `
                    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 mb-6">
                        <h2 class="text-2xl font-bold text-white mb-6 flex items-center gap-3">
                            <div class="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center">
                                <div class="w-4 h-4 bg-white rounded"></div>
                            </div>
                            إدارة أعداد المتابعين
                        </h2>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${platforms.map(platform => `
                                <div class="bg-gray-800 border border-gray-700 rounded-2xl p-6 hover:border-red-500 transition-colors">
                                    <!-- Platform Header -->
                                    <div class="flex items-center justify-between mb-4">
                                        <div class="flex items-center gap-3">
                                            <div class="w-12 h-12 rounded-lg flex items-center justify-center" style="background-color: ${platform.color_hex}20">
                                                ${getIcon(platform.platform_key)}
                                            </div>
                                            <div>
                                                <h3 class="text-lg font-bold text-white">${platform.platform_name}</h3>
                                                <p class="text-xs text-gray-400">آخر تحديث: ${new Date(platform.last_updated).toLocaleDateString('ar-SA')}</p>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <!-- Follower Count Display/Edit -->
                                    <div class="space-y-3">
                                        <div class="text-3xl font-bold text-white mb-2" id="count-${platform.platform_key}">
                                            ${formatNumber(platform.follower_count)}
                                        </div>
                                        <div class="space-y-2" id="edit-${platform.platform_key}" style="display: none;">
                                            <input type="number" id="input-${platform.platform_key}" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white text-center text-2xl font-bold focus:outline-none focus:border-red-500" placeholder="أدخل العدد الجديد" min="0">
                                            <div class="flex gap-2">
                                                <button onclick="saveUpdate('${platform.platform_key}')" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded-lg transition-colors">
                                                    حفظ
                                                </button>
                                                <button onclick="cancelEdit('${platform.platform_key}')" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 rounded-lg transition-colors">
                                                    إلغاء
                                                </button>
                                            </div>
                                        </div>
                                        <button onclick="startEdit('${platform.platform_key}', ${platform.follower_count})" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg transition-colors" id="editBtn-${platform.platform_key}">
                                            تعديل العدد
                                        </button>
                                    </div>
                                    
                                    <!-- Platform Link -->
                                    ${platform.profile_url ? `
                                        <div class="mt-4">
                                            <a href="${platform.profile_url}" target="_blank" rel="noopener noreferrer" class="text-blue-400 hover:text-blue-300 text-sm underline">
                                                فتح الصفحة
                                            </a>
                                        </div>
                                    ` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            root.innerHTML = content;
        }
        
        // Start edit
        function startEdit(platformKey, currentCount) {
            document.getElementById(`count-${platformKey}`).style.display = 'none';
            document.getElementById(`editBtn-${platformKey}`).style.display = 'none';
            document.getElementById(`edit-${platformKey}`).style.display = 'block';
            document.getElementById(`input-${platformKey}`).value = currentCount;
        }
        
        // Cancel edit
        function cancelEdit(platformKey) {
            document.getElementById(`count-${platformKey}`).style.display = 'block';
            document.getElementById(`editBtn-${platformKey}`).style.display = 'block';
            document.getElementById(`edit-${platformKey}`).style.display = 'none';
        }
        
        // Save update - now just updates the static data
        function saveUpdate(platformKey) {
            const newCount = parseInt(document.getElementById(`input-${platformKey}`).value);
            if (isNaN(newCount) || newCount < 0) {
                alert('الرجاء إدخال رقم صحيح');
                return;
            }
            
            // Update the static data
            const platform = platforms.find(p => p.platform_key === platformKey);
            if (platform) {
                platform.follower_count = newCount;
                platform.last_updated = new Date().toISOString();
                alert('تم تحديث العدد بنجاح');
                cancelEdit(platformKey);
                render();
            }
        }
        
        // Initialize - render static data immediately
        render();
    </script>
</body>
</html>
